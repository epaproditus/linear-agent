name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  ci:
    name: CI — Tests & Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with Ruff
        run: ruff check --target-version py311 .

      - name: Test with pytest
        run: pytest
        env:
          LINEAR_API_KEY: test-key
          LINEAR_WEBHOOK_SECRET: test-secret

  cd-architect:
    name: Deploy — Architect (droplet)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to architect VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ARCHITECT_HOST }}
          port: ${{ secrets.ARCHITECT_PORT || '22' }}
          username: ${{ secrets.ARCHITECT_USER || 'root' }}
          key: ${{ secrets.ARCHITECT_SSH_KEY }}
          script: |
            set -e
            cd /root/linear-agent
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            .venv/bin/pip install -r requirements.txt
            systemctl restart linear-agent.service
            echo "=== Deployed architect (commit $(git rev-parse --short HEAD)) ==="

  cd-worker:
    name: Deploy — Worker (abe VPS)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    needs: [cd-architect]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to worker VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.WORKER_HOST }}
          port: ${{ secrets.WORKER_PORT || '22' }}
          username: ${{ secrets.WORKER_USER || 'abe' }}
          key: ${{ secrets.WORKER_SSH_KEY }}
          script: |
            set -e
            cd /home/abe/linear-agent
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            .venv/bin/pip install -r requirements.txt
            sudo systemctl restart linear-agent.service
            echo "=== Deployed worker (commit $(git rev-parse --short HEAD)) ==="
