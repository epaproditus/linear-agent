name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  ci:
    name: CI — Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with Ruff
        run: ruff check --target-version py311 .

      - name: Test with pytest
        run: pytest
        env:
          LINEAR_API_KEY: test-key
          LINEAR_WEBHOOK_SECRET: test-secret

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci]
    strategy:
      matrix:
        target:
          - name: Architect
            label: architect
            path: /root/linear-agent
          - name: Worker
            label: worker
            path: /home/abe/linear-agent
    runs-on: [self-hosted, "${{ matrix.target.label }}"]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          set -e
          DEPLOY_DIR="${{ matrix.target.path }}"
          cd "$DEPLOY_DIR"
          git fetch origin main
          git reset --hard origin/main
          "$DEPLOY_DIR/.venv/bin/pip" install -r requirements.txt
          systemctl restart linear-agent.service
          echo "=== Deployed ${{ matrix.target.name }} (commit $(git rev-parse --short HEAD)) ===
